name: Aggiorna IPTV da M3U

on:
  push:
    paths:
      - 'm3u/858it.m3u'  # Si attiva solo quando cambia questo file
    branches:
      - main  # o master, a seconda del branch principale
  workflow_dispatch:  # Permette esecuzione manuale

jobs:
  update-iptv:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Prende tutta la storia per commit corretti
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Nessuna dipendenza esterna necessaria (solo librerie standard)
    
    - name: Run update script
      run: |
        python update_iptv.py
    
    - name: Check for changes
      id: git-check
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add dtt/ news/ doc/ smile/ music/ esteri/ webcam/
        if git diff --staged --quiet; then
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "ℹ️ Nessuna modifica da committare"
        else
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "✅ Modifiche rilevate"
        fi
    
    - name: Commit and push changes
      if: steps.git-check.outputs.changes == 'true'
      run: |
        git commit -m "Aggiornamento automatico IPTV da m3u/858it.m3u [skip ci]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
